<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Scanner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    #container { position: relative; width: 100vw; height: 100vh; }
    video { width: 100%; height: 100%; object-fit: cover; display: block; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

    #status {
      position: absolute;
      bottom: 80px;
      width: 100%;
      text-align: center;
      color: #00ff00;
      font-size: 2em;
      font-weight: bold;
      letter-spacing: 4px;
      text-shadow: 0 0 12px #00ff00;
      transition: color 0.2s;
    }

    #start-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 22px 44px;
      background: #000;
      color: #00ff00;
      font-size: 1.4em;
      font-family: monospace;
      font-weight: bold;
      letter-spacing: 3px;
      border: 2px solid #00ff00;
      cursor: pointer;
      box-shadow: 0 0 20px #00ff00;
    }
    #start-btn:active { background: #00ff00; color: #000; }
  </style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <div id="status"></div>
  <button id="start-btn" onclick="startApp()">[ TAP TO SCAN ]</button>
</div>

<script>
  const video   = document.getElementById('video');
  const canvas  = document.getElementById('overlay');
  const ctx     = canvas.getContext('2d');
  const statusEl = document.getElementById('status');

  let audioCtx, phase = 'idle', scanY = 0, scanDir = 1, scanPassCount = 0;
  let animFrame, lastBeepTs = 0;

  // ─── Audio helpers ────────────────────────────────────────────────────────
  function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function tone(freq, dur, type = 'square', delay = 0, vol = 0.25) {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + dur);
    osc.start(audioCtx.currentTime + delay);
    osc.stop(audioCtx.currentTime + delay + dur + 0.01);
  }

  function playScanningStart() {
    // boop boop bip boop
    [280, 420, 210, 560].forEach((f, i) => tone(f, 0.12, 'square', i * 0.18));
  }

  function playRandomBeep() {
    tone(150 + Math.random() * 500, 0.07, 'square');
  }

  function playDetected() {
    // Ascending alert
    [600, 800, 1000, 1400, 1800].forEach((f, i) => tone(f, 0.09, 'square', i * 0.08));
    tone(1800, 0.35, 'square', 0.5);
  }

  function playDing() {
    // Triumphant ding chord
    tone(1760, 0.05, 'sine', 0,    0.3);
    tone(2217, 0.05, 'sine', 0.06, 0.3);
    tone(2637, 0.4,  'sine', 0.12, 0.3);
    tone(3520, 0.4,  'sine', 0.14, 0.15);
  }

  // ─── Camera ───────────────────────────────────────────────────────────────
  async function startCamera(facing) {
    if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
  }

  // ─── Canvas sizing ────────────────────────────────────────────────────────
  function resizeCanvas() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }

  // ─── Drawing helpers ──────────────────────────────────────────────────────
  function drawBrackets(color, size = 44, pad = 24) {
    const w = canvas.width, h = canvas.height;
    ctx.strokeStyle = color;
    ctx.lineWidth   = 4;
    ctx.shadowColor = color;
    ctx.shadowBlur  = 12;
    // corners: [startX, startY, endX1, endY1, endX2, endY2]
    [
      [pad,         pad,         pad + size, pad,         pad,         pad + size],
      [w-pad-size,  pad,         w-pad,      pad,         w-pad,       pad + size],
      [pad,         h-pad-size,  pad,        h-pad,       pad + size,  h-pad     ],
      [w-pad-size,  h-pad,       w-pad,      h-pad,       w-pad,       h-pad-size],
    ].forEach(([x1,y1,x2,y2,x3,y3]) => {
      ctx.beginPath();
      ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
      ctx.moveTo(x1, y1); ctx.lineTo(x3, y3);
      ctx.stroke();
    });
    ctx.shadowBlur = 0;
  }

  function drawGrid(color = 'rgba(0,255,0,0.06)') {
    ctx.strokeStyle = color;
    ctx.lineWidth   = 1;
    for (let x = 0; x < canvas.width;  x += 32) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 32) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }
  }

  function drawScanLine(y) {
    const g = ctx.createLinearGradient(0, y - 25, 0, y + 25);
    g.addColorStop(0,   'rgba(0,255,0,0)');
    g.addColorStop(0.5, 'rgba(0,255,0,0.85)');
    g.addColorStop(1,   'rgba(0,255,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, y - 25, canvas.width, 50);

    // bright core line
    ctx.fillStyle = 'rgba(180,255,180,0.9)';
    ctx.fillRect(0, y - 1, canvas.width, 2);
  }

  function drawFaceBox() {
    const fw = canvas.width  * 0.52;
    const fh = canvas.height * 0.42;
    const fx = (canvas.width  - fw) / 2;
    const fy = canvas.height  * 0.08;

    ctx.strokeStyle = '#00ff00';
    ctx.lineWidth   = 3;
    ctx.shadowColor = '#00ff00';
    ctx.shadowBlur  = 14;
    ctx.strokeRect(fx, fy, fw, fh);

    ctx.fillStyle  = '#00ff00';
    ctx.font       = 'bold 22px monospace';
    ctx.textAlign  = 'center';
    ctx.shadowBlur = 16;
    ctx.fillText('▶  SUBJECT IDENTIFIED  ◀', canvas.width / 2, fy - 12);
    ctx.shadowBlur = 0;
  }

  // ─── Main loop ────────────────────────────────────────────────────────────
  function loop(ts) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (phase === 'scanning') {
      drawGrid();
      drawBrackets('#00ff00');

      scanY += scanDir * 5;
      if (scanY >= canvas.height) { scanY = canvas.height; scanDir = -1; scanPassCount++; }
      if (scanY <= 0)             { scanY = 0;             scanDir =  1; scanPassCount++; }

      drawScanLine(scanY);

      if (ts - lastBeepTs > 550) {
        lastBeepTs = ts;
        playRandomBeep();
      }

      // 3 full up-down passes = done
      if (scanPassCount >= 6) {
        phase = 'detected';
        statusEl.textContent   = '⚠  DETECTED  ⚠';
        statusEl.style.color      = '#ff3300';
        statusEl.style.textShadow = '0 0 16px #ff3300';
        playDetected();
        setTimeout(switchToFront, 2000);
      }

    } else if (phase === 'detected') {
      drawBrackets('#ff3300', 50, 20);
      if (Math.floor(Date.now() / 180) % 2 === 0) {
        ctx.fillStyle = 'rgba(255,30,0,0.08)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

    } else if (phase === 'found') {
      drawGrid('rgba(0,255,0,0.05)');
      drawBrackets('#00ff00');
      drawFaceBox();
    }

    animFrame = requestAnimationFrame(loop);
  }

  // ─── Phase transitions ────────────────────────────────────────────────────
  async function startApp() {
    document.getElementById('start-btn').style.display = 'none';
    initAudio();
    resizeCanvas();
    await startCamera('environment');
    phase          = 'scanning';
    scanY          = 0;
    scanDir        = 1;
    scanPassCount  = 0;
    statusEl.textContent   = 'SCANNING...';
    statusEl.style.color      = '#00ff00';
    statusEl.style.textShadow = '0 0 12px #00ff00';
    playScanningStart();
    requestAnimationFrame(loop);
  }

  async function switchToFront() {
    cancelAnimationFrame(animFrame);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    statusEl.textContent = '';
    await startCamera('user');
    phase = 'found';
    statusEl.textContent   = '✓  FOUND  ✓';
    statusEl.style.color      = '#00ff00';
    statusEl.style.textShadow = '0 0 14px #00ff00';
    playDing();
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resizeCanvas);
</script>
</body>
</html>
